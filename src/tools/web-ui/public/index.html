<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web UI fyuobot</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Web UI</p>
        <h1>fyuobot</h1>
      </div>
      <div class="statusline">
        <span id="daemon-dot" class="dot dot-off"></span>
        <span id="daemon-text">daemon offline</span>
        <span id="scheduler-jobs" class="status-chip">P 0 / R 0</span>
        <span class="status-separator"></span>
        <span id="connection-dot" class="dot dot-off"></span>
        <span id="connection-text">connecting</span>
      </div>
    </header>

    <main class="layout">
      <aside class="panel rail">
        <div class="panel-head">
          <h2>Event Stream</h2>
          <span id="event-count" class="badge">0</span>
        </div>
        <div id="event-stream" class="event-stream"></div>
      </aside>

      <div
        id="layout-splitter"
        class="layout-splitter"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize panels"
      >
        <span class="layout-splitter-handle"></span>
      </div>

      <section class="panel board">
        <div class="panel-head">
          <div class="sidebar-headline">
            <h2 id="sidebar-title">Agents</h2>
            <span id="sidebar-count" class="badge">0</span>
          </div>
        </div>
        <div id="sidebar-agents" class="sidebar-view is-active" data-sidebar-view-panel="agents">
          <div id="agent-grid" class="agent-grid"></div>
        </div>
        <div id="sidebar-agent-changes" class="sidebar-view" data-sidebar-view-panel="agent-changes" hidden>
          <div id="change-list" class="change-list"></div>
        </div>
        <div id="sidebar-code-changes" class="sidebar-view" data-sidebar-view-panel="code-changes" hidden>
          <div id="code-change-list" class="change-list"></div>
        </div>
        <div id="sidebar-token-usage" class="sidebar-view" data-sidebar-view-panel="token-usage" hidden>
          <section id="token-usage-panel" class="token-usage-panel" aria-live="polite">
            <div class="token-usage-head">
              <div>
                <p class="token-usage-eyebrow">Token Usage</p>
                <h2 class="token-usage-title">消耗概览</h2>
              </div>
              <div class="token-usage-meta">
                <span id="token-usage-scope" class="token-usage-scope">当前视图</span>
                <span id="token-usage-time" class="token-usage-time">等待数据</span>
              </div>
            </div>

            <section id="token-usage-model-trend" class="token-usage-section" hidden>
              <div class="token-section-head">
                <div>
                  <p class="token-section-eyebrow">Models</p>
                  <h3 class="token-section-title">不同模型一周消耗量</h3>
                </div>
                <p class="token-section-copy">按日期查看各模型总消耗对比。</p>
              </div>
              <div class="token-usage-chart-shell token-usage-chart-shell-models">
                <svg id="token-usage-model-chart" class="token-usage-chart token-usage-chart-models" viewBox="0 0 640 260" preserveAspectRatio="none" aria-label="Weekly token usage by model"></svg>
              </div>
              <div id="token-usage-model-legend" class="token-usage-legend"></div>
            </section>

            <section id="token-usage-heatmap" class="token-usage-section" hidden>
              <div class="token-section-head">
                <div>
                  <p class="token-section-eyebrow">Heatmap</p>
                  <h3 class="token-section-title">全年消耗强度</h3>
                </div>
                <div class="token-section-actions">
                  <label class="token-year-picker">
                    <span class="token-year-label">Model</span>
                    <select id="token-usage-model-filter" class="token-year-select" aria-label="选择 token 数据模型"></select>
                  </label>
                  <label class="token-year-picker">
                    <span class="token-year-label">Year</span>
                    <select id="token-usage-year" class="token-year-select" aria-label="选择 token 数据年份"></select>
                  </label>
                </div>
              </div>
              <p id="token-usage-detail-copy" class="token-section-copy">格子越亮，总消耗越高。</p>
              <div id="token-usage-heatmap-shell" class="token-usage-heatmap-shell">
                <div id="token-usage-heatmap-months" class="token-usage-heatmap-months"></div>
                <div id="token-usage-heatmap-grid" class="token-usage-heatmap-grid"></div>
              </div>
              <div class="token-heatmap-footer">
                <div id="token-usage-heatmap-scale" class="token-heatmap-scale"></div>
              </div>
            </section>

            <section id="token-usage-trend" class="token-usage-section" hidden>
              <div class="token-section-head">
                <div>
                  <p class="token-section-eyebrow">Trend</p>
                  <h3 id="token-usage-trend-title" class="token-section-title">一周消耗趋势</h3>
                </div>
                <p id="token-usage-trend-copy" class="token-section-copy">输入、缓存命中、缓存未命中、输出</p>
              </div>
              <div class="token-usage-chart-shell">
                <svg id="token-usage-chart" class="token-usage-chart" viewBox="0 0 640 260" preserveAspectRatio="none" aria-label="Token usage weekly trend"></svg>
              </div>
              <div id="token-usage-legend" class="token-usage-legend"></div>
            </section>
          </section>
        </div>
      </section>

      <nav class="sidebar-switcher" aria-label="Side panel switcher">
        <div class="sidebar-switcher-track" role="tablist" aria-label="Side panel views">
          <button
            id="tab-agents"
            class="sidebar-tab is-active"
            type="button"
            data-sidebar-view="agents"
            role="tab"
            aria-selected="true"
            title="Agents"
          >
            <span class="sidebar-tab-label">Agents</span>
          </button>
          <button
            id="tab-agent-changes"
            class="sidebar-tab"
            type="button"
            data-sidebar-view="agent-changes"
            role="tab"
            aria-selected="false"
            title="Agent Changes"
          >
            <span class="sidebar-tab-label">Agent Changes</span>
          </button>
          <button
            id="tab-code-changes"
            class="sidebar-tab"
            type="button"
            data-sidebar-view="code-changes"
            role="tab"
            aria-selected="false"
            title="代码改动"
          >
            <span class="sidebar-tab-label">代码改动</span>
          </button>
          <button
            id="tab-token-usage"
            class="sidebar-tab"
            type="button"
            data-sidebar-view="token-usage"
            role="tab"
            aria-selected="false"
            title="Token Usage"
          >
            <span class="sidebar-tab-label">Token Usage</span>
          </button>
        </div>
      </nav>
    </main>

    <section class="panel composer">
      <form id="query-form" class="query-form">
        <div class="query-toolbar">
          <label class="query-label" for="query-input">Send Query</label>
          <label class="query-model-picker" for="query-model-select">
            <span class="query-model-label">Model</span>
            <select id="query-model-select" class="query-model-select" aria-label="选择查询模型"></select>
          </label>
        </div>
        <div class="query-row">
          <div class="query-input-shell">
            <div id="query-highlight" class="query-highlight" aria-hidden="true"></div>
            <textarea id="query-input" class="query-input" rows="3" placeholder="输入消息，直接通过 api-server 发送给 agent"></textarea>
          </div>
          <button id="query-submit" class="query-submit" type="submit">Run</button>
        </div>
        <div id="slash-hints" class="slash-hints"></div>
      </form>
    </section>
  </div>

  <template id="agent-card-template">
    <article class="agent-card">
      <div class="agent-head">
        <div>
          <h3 class="agent-name"></h3>
          <p class="agent-kind"></p>
        </div>
        <div class="agent-actions">
          <span class="agent-state"></span>
          <button type="button" class="agent-delete" title="删除子 agent">删除</button>
        </div>
      </div>
      <p class="agent-activity"></p>
      <dl class="agent-meta"></dl>
    </article>
  </template>

  <template id="event-item-template">
    <article class="event-item">
      <div class="event-top">
        <span class="event-type"></span>
        <time class="event-time"></time>
      </div>
      <p class="event-summary"></p>
      <p class="event-agent"></p>
    </article>
  </template>

  <template id="turn-group-template">
    <section class="turn-group">
      <div class="turn-head">
        <div>
          <p class="turn-id"></p>
          <p class="turn-meta"></p>
        </div>
      </div>
      <div class="turn-body"></div>
    </section>
  </template>

  <template id="confirmation-card-template">
    <section class="confirm-card" role="group" aria-label="等待确认的敏感操作">
      <div class="confirm-head">
        <p class="confirm-eyebrow">Sensitive Action</p>
        <h3 class="confirm-title">等待确认</h3>
        <p class="confirm-queue"></p>
        <div class="confirm-head-tool">
          <span class="confirm-label">Tool</span>
          <strong class="confirm-value" data-confirm-tool-name>-</strong>
        </div>
      </div>
      <div class="confirm-body">
        <button type="button" class="confirm-command" data-confirm-command-toggle aria-expanded="false">
          <span class="confirm-command-label">Command</span>
          <code class="confirm-command-preview" data-confirm-command-preview></code>
          <pre class="confirm-args" data-confirm-tool-args hidden></pre>
        </button>
      </div>
      <div class="confirm-actions">
        <label class="confirm-feedback-shell">
          <span class="confirm-inline-label">Other</span>
            <textarea
              class="confirm-feedback"
              data-confirm-feedback
              rows="1"
              placeholder="其他操作"
            ></textarea>
        </label>
        <button type="button" class="confirm-button is-secondary" data-confirm-action="reject">拒绝</button>
        <button type="button" class="confirm-button is-primary" data-confirm-action="approve">允许执行</button>
      </div>
    </section>
  </template>

  <div id="token-usage-tooltip" class="token-usage-tooltip" role="tooltip" hidden></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
